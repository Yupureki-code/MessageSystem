syntax = "proto3";
package messageSystem;
import "comm.proto";
option cc_generic_services = true;

message CommRsp
{
    string request_id = 1;
    bool status = 2;
    string errmsg = 3;
}

//----------------------------
//用户名注册   
message UserRegisterReq {
    string request_id = 1;
    string nickname = 2;
    string password = 3;
    optional string verify_code_id = 4; //目前客户端实现了本地验证，该字段没用了
    optional string verify_code = 5;//目前客户端实现了本地验证，该字段没用了
}


message UserRegisterRsp {
    CommRsp response = 1;
}
//----------------------------
//用户名登录 
message UserLoginReq {
    string request_id = 1;
    string uid = 6;
    string nickname = 2;
    string password = 3;
    optional string verify_code_id = 4;
    optional string verify_code = 5;
}

message UserLoginRsp {
    CommRsp response = 1;
    string login_session_id = 4;
}
//----------------------------
//手机号验证码获取
message EmailVerifyCodeReq {
    string request_id = 1;
    string email = 2;
}
message EmailVerifyCodeRsp {
    CommRsp response = 1;
    string verify_code_id = 2;
}
//----------------------------
//手机号注册
message EmailRegisterReq {
    string request_id = 1;
    string email = 2;
    string verify_code = 3;
}
message EmailRegisterRsp {
    CommRsp response = 1;
}
//----------------------------
//手机号登录
message EmailLoginReq {
    string request_id = 1;
    string email = 2;
    string verify_code = 3;
}
message EmailLoginRsp {
    CommRsp response = 1;
    string login_session_id = 2;
}
//个人信息获取-这个只用于获取当前登录用户的信息
//  客户端传递的时候只需要填充session_id即可
//其他个人/好友信息的获取在好友操作中完成
message GetUserInfoReq {
    string request_id = 1;
    optional string user_id = 2;    // 这个字段是网关进行身份鉴权之后填入的字段
    optional string session_id = 3; // 进行客户端身份识别的关键字段
}
message GetUserInfoRsp {
    CommRsp response = 1;
    UserInfo user_info = 2;
}
//内部接口
message GetMultiUserInfoReq {
    string request_id = 1;
    repeated string users_id = 2;
}
message GetMultiUserInfoRsp {
    CommRsp response = 1;
    map<string, UserInfo> users_info = 2;
}
//----------------------------
//用户头像修改 
message SetUserAvatarReq {
    string request_id = 1;
    optional string user_id = 2;
    optional string session_id = 3;
    bytes avatar = 4;
}
message SetUserAvatarRsp {
    CommRsp response = 1; 
}
//----------------------------
//用户昵称修改 
message SetUserNicknameReq {
    string request_id = 1;
    optional string user_id = 2;
    optional string session_id = 3;
    string nickname = 4;
}
message SetUserNicknameRsp {
    CommRsp response = 1;
}
//----------------------------
//用户签名修改 
message SetUserDescriptionReq {
    string request_id = 1;
    optional string user_id = 2;
    optional string session_id = 3;
    string description = 4;
}
message SetUserDescriptionRsp {
    CommRsp response = 1;
}
//----------------------------
//用户手机修改 
message SetUserEmailNumberReq {
    string request_id = 1;
    optional string user_id = 2;
    optional string session_id = 3;
    string email = 4;
    string email_verify_code = 5;
}
message SetUserEmailNumberRsp {
    CommRsp response = 1;
}

service UserService {
    rpc UserRegister(UserRegisterReq) returns (UserRegisterRsp);
    rpc UserLogin(UserLoginReq) returns (UserLoginRsp);
    rpc GetEmailVerifyCode(EmailVerifyCodeReq) returns (EmailVerifyCodeRsp);
    rpc EmailRegister(EmailRegisterReq) returns (EmailRegisterRsp);
    rpc EmailLogin(EmailLoginReq) returns (EmailLoginRsp);
    rpc GetUserInfo(GetUserInfoReq) returns (GetUserInfoRsp);
    rpc GetMultiUserInfo(GetMultiUserInfoReq) returns (GetMultiUserInfoRsp);
    rpc SetUserAvatar(SetUserAvatarReq) returns (SetUserAvatarRsp);
    rpc SetUserNickname(SetUserNicknameReq) returns (SetUserNicknameRsp);
    rpc SetUserDescription(SetUserDescriptionReq) returns (SetUserDescriptionRsp);
    rpc SetUserEmailNumber(SetUserEmailNumberReq) returns (SetUserEmailNumberRsp);
}