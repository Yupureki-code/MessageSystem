syntax = "proto3";
package messageSystem;
import "comm.proto";

option cc_generic_services = true;

message CreateConversationReq
{
    CommReq request = 1;
    bool is_group = 2;
    repeated string comm_uid = 3;
    optional string group_conversation_name = 4;
}

message CreateConversationRsp
{
    CommRsp response = 1;
    string conversation_id = 2;
}

message RemoveConversationReq
{
    CommReq request = 1;
    string conversaion_id = 2;
}

message AddMemberReq
{
    CommReq request = 1;
    string conversaion_id = 2;
    optional string user_id = 3;
}

message ExitConversationReq
{
    CommReq request = 1;
    string conversaion_id = 2;
    optional string user_id = 3;
}

message ChangeMemberPowerReq
{
    CommReq request = 1;
    string conversaion_id = 2;
    string uid = 3;
    int32 power = 4;
}

message GetConversationMemberListReq
{
    CommReq request = 1;
    string conversaion_id = 2;
    optional string user_id = 3;
}

message GetConversationMemberListRsp
{
    CommRsp response = 1;
    repeated UserInfo user_infos = 2;
}

message SearchConversationReq
{
    CommReq request = 1;
    optional string conversaion_id = 2;
    optional string conversaion_name = 3;
}

message SearchConversationRsp
{
    CommRsp response = 1;
    repeated ConversationInfo conversations = 2;
}

service ConversationServer {
    rpc CreateConversation(CreateConversationReq) returns (CreateConversationRsp);
    rpc RemoveConversation(RemoveConversationReq) returns (CommRsp);
    rpc AddMember(AddMemberReq) returns (CommRsp);
    rpc ExitConversation(ExitConversationReq) returns (CommRsp);
    rpc ChangeMemberPower(ChangeMemberPowerReq) returns (CommRsp);
    rpc GetConversationMemberList(GetConversationMemberListReq) returns (GetConversationMemberListRsp);
    rpc SearchConversation(SearchConversationReq) returns (SearchConversationRsp);
}