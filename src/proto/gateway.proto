syntax = "proto3";
package messageSystem;
option cc_generic_services = true;
import "comm.proto";
import "user.proto";
import "conversation.proto";
import "friend.proto";



service GateWayServer
{
    rpc UserLogin(UserLoginReq) returns (UserLoginRsp);
    rpc GetEmailVerifyCode(EmailVerifyCodeReq) returns (CommRsp);
    rpc EmailRegister(EmailRegisterReq) returns (CommRsp);
    rpc EmailLogin(EmailLoginReq) returns (EmailLoginRsp);
    rpc GetUserInfo(GetUserInfoReq) returns (GetUserInfoRsp);
    rpc GetMultiUserInfo(GetMultiUserInfoReq) returns (GetMultiUserInfoRsp);
    rpc SetUserAvatar(SetUserAvatarReq) returns (CommRsp);
    rpc SetUserNickname(SetUserNameReq) returns (CommRsp);
    rpc SetUserDescription(SetUserDescriptionReq) returns (CommRsp);
    rpc SetUserEmail(SetUserEmailReq) returns (CommRsp);
    rpc CreateConversation(CreateConversationReq) returns (CreateConversationRsp);
    rpc RemoveConversation(RemoveConversationReq) returns (CommRsp);
    rpc AddMember(AddMemberReq) returns (CommRsp);
    rpc ExitConversation(ExitConversationReq) returns (CommRsp);
    rpc ChangeMemberPower(ChangeMemberPowerReq) returns (CommRsp);
    rpc GetConversationMemberList(GetConversationMemberListReq) returns (GetConversationMemberListRsp);
    rpc SearchConversation(SearchConversationReq) returns (SearchConversationRsp);
    rpc FriendRequest(FriendRequestReq) returns (CommRsp);
    rpc FriendRequestStatus(FriendRequestStatusReq) returns (CommRsp);
    rpc FriendRemark(FriendRemarkReq) returns (CommRsp);
    rpc FindFriendByUID(FindFriendByUIDReq) returns (FindFriendByUIDRsp);
    rpc FindFriendByName(FindFriendByNameReq) returns (FindFriendByNameRsp);
}