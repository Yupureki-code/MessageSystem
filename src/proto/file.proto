syntax = "proto3";
package messageSystem;
import "comm.proto";

option cc_generic_services = true;

message GetFileReq 
{
    CommReq request = 1;
    repeated string file_id_list = 2;
}

message GetFileRsp 
{
    string request_id = 1;
    bool success = 2;
    string errmsg = 3; 
    map<string, FileDownloadData> file_data = 4;
}

message PutFileReq 
{
    CommReq request = 1;
    repeated FileUploadData file_data = 2;
}


message DeleteFileReq 
{
    CommReq request = 1;
    repeated string file_id_list = 2;
}


service FileService {
    rpc GetSingleFile(GetFileReq) returns (GetFileRsp);
    rpc GetMultiFile(GetFileReq) returns (GetFileRsp);
    rpc PutSingleFile(PutFileReq) returns (CommRsp);
    rpc PutMultiFile(PutFileReq) returns (CommRsp);
    rpc DeleteMultiFile(DeleteFileReq) returns (CommRsp);
}